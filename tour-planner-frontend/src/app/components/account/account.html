<div class="flex flex-col gap-6 p-4">
  <div>
    <h2 class="text-2xl font-bold">Profile</h2>
    <p class="text-muted-foreground">Manage your account</p>
  </div>

  @if (authService.currentUser(); as user) {
    <div class="flex flex-col gap-4 border border-sidebar-border rounded-xl p-4 bg-muted/20">
      <div class="flex items-center gap-4">
        <span class="material-icons text-5xl text-primary">account_circle</span>
        <div>
          <h3 class="text-lg font-bold">{{ user.username }}</h3>
          <p class="text-sm text-muted-foreground">{{ user.email }}</p>
        </div>
      </div>
    </div>

    <div class="pt-4 border-t border-sidebar-border">
      <button z-button zType="destructive" zFull (click)="logout()">
        Logout
      </button>
    </div>
  } @else {
    <div class="flex flex-col items-center justify-center py-20 opacity-50">
      <span class="material-icons text-6xl">lock_outline</span>
      <p class="mt-4 text-lg">Not logged in.</p>
    </div>
  }
</div>
