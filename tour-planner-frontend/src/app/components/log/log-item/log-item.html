<div class="group bg-sidebar border border-sidebar-border rounded-xl p-3 space-y-2 hover:border-primary/50 transition-colors">
  <div class="flex justify-between items-start">
    <div class="flex flex-col">
      <span class="text-[10px] font-bold text-foreground">{{ log.date_time | date:'mediumDate' }}</span>
      <div class="flex items-center gap-1">
        @for (star of [1,2,3,4,5]; track star) {
          <span class="material-icons text-[10px]" [class.text-primary]="star <= log.rating" [class.text-muted-foreground]="star > log.rating">
            {{ star <= log.rating ? 'star' : 'star_border' }}
          </span>
        }
      </div>
    </div>
    <div class="flex gap-2 items-center">
      <span class="text-[10px] px-1.5 py-0.5 rounded bg-muted font-bold">Diff: {{ log.difficulty }}</span>
      <button 
        z-button zType="ghost" zSize="sm" 
        class="h-6 w-6 p-0 text-muted-foreground hover:text-destructive opacity-0 group-hover:opacity-100 transition-opacity"
        (click)="confirmDelete()"
        title="Delete log"
      >
        <span class="material-icons text-xs">delete</span>
      </button>
    </div>
  </div>
  <p class="text-[11px] text-muted-foreground leading-relaxed">{{ log.comment }}</p>
  <div class="flex gap-3 pt-1 border-t border-sidebar-border/50 text-[9px] font-bold text-muted-foreground">
    <div class="flex items-center gap-1">
      <span class="material-icons text-[10px]">route</span>
      {{ log.total_distance_km }} km
    </div>
    <div class="flex items-center gap-1">
      <span class="material-icons text-[10px]">timer</span>
      {{ log.total_time_min }}
    </div>
  </div>
</div>
