<div class="group relative flex bg-sidebar border border-sidebar-border rounded-xl overflow-hidden hover:shadow-md transition-all">
  <!-- Main Content Area -->
  <div class="flex-1 p-3 flex flex-col gap-2 min-w-0">
    <div class="flex justify-between items-start">
      <div class="flex flex-col">
        <span class="text-[10px] font-bold text-foreground">{{ log.dateTime | date:'mediumDate' }}</span>
        <div class="flex items-center gap-1">
          @for (star of [1,2,3,4,5]; track star) {
            <span class="material-icons text-[10px]" [class.text-primary]="star <= log.rating" [class.text-muted-foreground]="star > log.rating">
              {{ star <= log.rating ? 'star' : 'star_border' }}
            </span>
          }
        </div>
      </div>
      <span class="text-[10px] px-1.5 py-0.5 rounded bg-muted font-bold">Diff: {{ log.difficulty }}</span>
    </div>

    <p class="text-[11px] text-muted-foreground leading-relaxed line-clamp-2">{{ log.comment }}</p>

    <div class="flex gap-3 pt-1 border-t border-sidebar-border/50 text-[9px] font-bold text-muted-foreground">
      <div class="flex items-center gap-1">
        <span class="material-icons text-[10px]">route</span>
        {{ log.totalDistanceKm }} km
      </div>
      <div class="flex items-center gap-1">
        <span class="material-icons text-[10px]">timer</span>
        {{ log.totalTimeMin }}
      </div>
    </div>
  </div>

  <!-- Segmented Action Bar -->
  <div class="w-10 flex flex-col border-l border-sidebar-border bg-muted/20 divide-y divide-sidebar-border opacity-0 group-hover:opacity-100 transition-opacity">
    <button
      z-button zType="ghost" zSize="sm"
      class="flex-1 rounded-none text-destructive hover:bg-destructive/10 p-0 min-w-0 h-auto"
      (click)="confirmDelete()"
      title="Delete log"
    >
      <span class="material-icons text-base">delete</span>
    </button>
    <button
      z-button zType="ghost" zSize="sm"
      class="flex-1 rounded-none text-primary hover:bg-primary/5 p-0 min-w-0 h-auto"
      (click)="logEdit.emit(log)"
      title="Edit log"
    >
      <span class="material-icons text-base">edit</span>
    </button>
  </div>
</div>
